[build]
  command = "npx prisma generate && npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  SECRETS_SCAN_OMIT_KEYS = "ALLOWED_ORIGINS"

[context.production]
  command = "npx prisma generate && npm run build"

[context.deploy-preview]
  command = "npx prisma generate && npm run build"

[context.branch-deploy]
  command = "npx prisma generate && npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."___netlify-server-handler"]
  external_node_modules = ["@prisma/client", "prisma"]

[images]
  remote_images = ["https://source.unsplash.com/.*", "https://images.unsplash.com/.*", "https://ext.same-assets.com/.*", "https://ugc.same-assets.com/.*"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "http://*/*"
  to = "https://:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/internal/health"
  to = "/.netlify/functions/health"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss:; object-src 'none'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
