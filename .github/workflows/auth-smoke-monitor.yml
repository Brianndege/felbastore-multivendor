name: Auth Smoke Monitor

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL for auth smoke checks"
        required: false
        default: "https://felbastore.co.ke"

permissions:
  contents: read
  issues: write

concurrency:
  group: auth-smoke-monitor
  cancel-in-progress: true

jobs:
  auth-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production auth smoke checks
        env:
          AUTH_SMOKE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://felbastore.co.ke' }}
        run: npm run smoke:auth:prod

      - name: Notify Slack on failure
        if: failure() && env.AUTH_SMOKE_SLACK_WEBHOOK_URL != ''
        env:
          AUTH_SMOKE_SLACK_WEBHOOK_URL: ${{ secrets.AUTH_SMOKE_SLACK_WEBHOOK_URL }}
        uses: ./.github/actions/notify-slack
        with:
          webhook_url: ${{ env.AUTH_SMOKE_SLACK_WEBHOOK_URL }}
          message: "❌ Auth smoke monitor failed for ${{ github.repository }} on ref ${{ github.ref_name }}. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Create or update GitHub issue on failure (fallback)
        if: failure() && env.AUTH_SMOKE_SLACK_WEBHOOK_URL == ''
        env:
          AUTH_SMOKE_SLACK_WEBHOOK_URL: ${{ secrets.AUTH_SMOKE_SLACK_WEBHOOK_URL }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- auth-smoke-monitor-incident -->';
            const issueTitle = 'Auth smoke monitor failure';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const baseUrl = (context.payload.inputs && context.payload.inputs.base_url) || 'https://felbastore.co.ke';

            const body = `${marker}
            ❌ Automated auth smoke monitoring failed.

            - Repository: ${context.repo.owner}/${context.repo.repo}
            - Ref: ${context.ref}
            - Base URL: ${baseUrl}
            - Workflow run: ${runUrl}
            - Trigger: ${context.eventName}

            Please investigate the failing auth checks and close this issue once resolved.`;

            const { owner, repo } = context.repo;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'auth-smoke,incident',
              per_page: 100,
            });

            const existing = openIssues.find((issue) =>
              issue.title === issueTitle && typeof issue.body === 'string' && issue.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing auth smoke incident issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels: ['auth-smoke', 'incident'],
              });
              core.info('Created new auth smoke incident issue');
            }