name: Netlify Deploy

on:
  push:
    branches:
      - main
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deploy to run"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview

concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Netlify Site Environment (Preview)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          node -e "const required=['NEXTAUTH_SECRET','NEXTAUTH_URL','DATABASE_URL']; const {execSync}=require('child_process'); const raw=execSync('npx netlify env:list --json',{stdio:['ignore','pipe','pipe']}).toString(); const rows=JSON.parse(raw); const names=new Set((Array.isArray(rows)?rows:[]).map((r)=>r.key).filter(Boolean)); const missing=required.filter((k)=>!names.has(k)); if(missing.length){ console.error('Missing Netlify env vars: '+missing.join(', ')); process.exit(1);} console.log('Netlify env preflight passed');"

      - name: Deploy Preview
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify deploy --build --json --debug

  deploy-production:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Netlify Site Environment (Production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          node -e "const required=['NEXTAUTH_SECRET','NEXTAUTH_URL','DATABASE_URL']; const {execSync}=require('child_process'); const raw=execSync('npx netlify env:list --json',{stdio:['ignore','pipe','pipe']}).toString(); const rows=JSON.parse(raw); const names=new Set((Array.isArray(rows)?rows:[]).map((r)=>r.key).filter(Boolean)); const missing=required.filter((k)=>!names.has(k)); if(missing.length){ console.error('Missing Netlify env vars: '+missing.join(', ')); process.exit(1);} console.log('Netlify env preflight passed');"

      - name: Deploy Production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify deploy --build --prod --json --debug

  smoke-auth-production:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production auth smoke checks
        env:
          AUTH_SMOKE_BASE_URL: https://felbastore.co.ke
        run: npm run smoke:auth:prod
