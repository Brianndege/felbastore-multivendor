name: Netlify Deploy

on:
  # Run on every branch push so non-main branches can produce preview deploys.
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deploy to run"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

# Least privilege default for all jobs.
permissions:
  contents: read

env:
  # Explicit Node version for reproducible installs/builds.
  NODE_VERSION: "20"

jobs:
  deploy-preview:
    name: Deploy Preview
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # Standard stable major tag.
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate required Netlify secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secret"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate Netlify site environment (preview)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          node <<'NODE'
          const { execSync } = require('child_process');

          const raw = execSync('npx netlify env:list --json --context deploy-preview', {
            stdio: ['ignore', 'pipe', 'pipe'],
          }).toString();
          const parsed = JSON.parse(raw);

          const names = new Set();

          const collectFromRows = (rows) => {
            if (!Array.isArray(rows)) return;
            for (const row of rows) {
              if (!row || typeof row !== 'object') continue;
              const candidate = row.key || row.name || row.id;
              if (typeof candidate === 'string' && candidate.length > 0) {
                names.add(candidate);
              }
            }
          };

          if (Array.isArray(parsed)) {
            collectFromRows(parsed);
          }

          if (parsed && typeof parsed === 'object') {
            collectFromRows(parsed.variables);
            collectFromRows(parsed.env);

            // Some CLI versions return an object keyed by env var name.
            for (const [key, value] of Object.entries(parsed)) {
              if (typeof key === 'string' && /^[A-Z0-9_]+$/.test(key)) {
                names.add(key);
              }
              if (Array.isArray(value)) {
                collectFromRows(value);
              }
            }
          }

          const missing = [];
          const hasJwt = names.has('JWT_SECRET') || names.has('NEXTAUTH_SECRET');
          if (!hasJwt) missing.push('JWT_SECRET|NEXTAUTH_SECRET');

          if (!(names.has('DATABASE_URL') || names.has('NETLIFY_DATABASE_URL'))) {
            missing.push('DATABASE_URL|NETLIFY_DATABASE_URL');
          }

          const hasAppBase =
            names.has('NEXTAUTH_URL') ||
            names.has('APP_URL') ||
            names.has('NEXT_PUBLIC_APP_URL') ||
            names.has('NEXT_PUBLIC_NEXTAUTH_URL');
          if (!hasAppBase) {
            missing.push('NEXTAUTH_URL|APP_URL|NEXT_PUBLIC_APP_URL|NEXT_PUBLIC_NEXTAUTH_URL');
          }

          if (missing.length) {
            console.error('Missing required Netlify env vars: ' + missing.join(', '));
            process.exit(1);
          }

          console.log('Netlify env preflight completed');
          NODE

      - name: Deploy preview
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -o pipefail
          for attempt in 1 2; do
            echo "Starting Netlify preview deploy (attempt ${attempt}/2)"
            if npx netlify deploy --build --json 2>&1 | tee netlify-preview-deploy.log; then
              exit 0
            fi
            if grep -E "Site deploy was successfully initiated|Site is live|Deploy complete|Website Draft URL|deploy_url|deploy_id" netlify-preview-deploy.log >/dev/null; then
              echo "Netlify preview deploy appears successful despite CLI non-zero exit; continuing"
              exit 0
            fi
            echo "Netlify preview deploy attempt ${attempt} failed"
            tail -n 200 netlify-preview-deploy.log || true
            if [ "$attempt" -eq 2 ]; then
              echo "Netlify preview deploy failed after 2 attempts"
              exit 1
            fi
            echo "Retrying in 10 seconds"
            sleep 10
          done

  deploy-production:
    name: Deploy Production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate required Netlify secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secret"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate Netlify site environment (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          node <<'NODE'
          const { execSync } = require('child_process');

          const raw = execSync('npx netlify env:list --json --context production', {
            stdio: ['ignore', 'pipe', 'pipe'],
          }).toString();
          const parsed = JSON.parse(raw);

          const names = new Set();

          const collectFromRows = (rows) => {
            if (!Array.isArray(rows)) return;
            for (const row of rows) {
              if (!row || typeof row !== 'object') continue;
              const candidate = row.key || row.name || row.id;
              if (typeof candidate === 'string' && candidate.length > 0) {
                names.add(candidate);
              }
            }
          };

          if (Array.isArray(parsed)) {
            collectFromRows(parsed);
          }

          if (parsed && typeof parsed === 'object') {
            collectFromRows(parsed.variables);
            collectFromRows(parsed.env);

            // Some CLI versions return an object keyed by env var name.
            for (const [key, value] of Object.entries(parsed)) {
              if (typeof key === 'string' && /^[A-Z0-9_]+$/.test(key)) {
                names.add(key);
              }
              if (Array.isArray(value)) {
                collectFromRows(value);
              }
            }
          }

          const missing = [];
          const hasJwt = names.has('JWT_SECRET') || names.has('NEXTAUTH_SECRET');
          if (!hasJwt) missing.push('JWT_SECRET|NEXTAUTH_SECRET');

          if (!(names.has('DATABASE_URL') || names.has('NETLIFY_DATABASE_URL'))) {
            missing.push('DATABASE_URL|NETLIFY_DATABASE_URL');
          }

          const hasAppBase =
            names.has('NEXTAUTH_URL') ||
            names.has('APP_URL') ||
            names.has('NEXT_PUBLIC_APP_URL') ||
            names.has('NEXT_PUBLIC_NEXTAUTH_URL');
          if (!hasAppBase) {
            missing.push('NEXTAUTH_URL|APP_URL|NEXT_PUBLIC_APP_URL|NEXT_PUBLIC_NEXTAUTH_URL');
          }

          if (missing.length) {
            console.error('Missing required Netlify env vars: ' + missing.join(', '));
            process.exit(1);
          }

          console.log('Netlify env preflight completed');
          NODE

      - name: Deploy production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -o pipefail
          for attempt in 1 2; do
            echo "Starting Netlify production deploy (attempt ${attempt}/2)"
            if npx netlify deploy --build --prod --json 2>&1 | tee netlify-production-deploy.log; then
              exit 0
            fi
            if grep -E "Site deploy was successfully initiated|Site is live|Deploy complete|Website URL|deploy_url|deploy_id" netlify-production-deploy.log >/dev/null; then
              echo "Netlify production deploy appears successful despite CLI non-zero exit; continuing"
              exit 0
            fi
            echo "Netlify production deploy attempt ${attempt} failed"
            tail -n 200 netlify-production-deploy.log || true
            if [ "$attempt" -eq 2 ]; then
              echo "Netlify production deploy failed after 2 attempts"
              exit 1
            fi
            echo "Retrying in 10 seconds"
            sleep 10
          done

  smoke-auth-production:
    name: Production Auth Smoke
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production auth smoke checks
        env:
          AUTH_SMOKE_BASE_URL: https://felbastore.co.ke
        run: npm run smoke:auth:prod
