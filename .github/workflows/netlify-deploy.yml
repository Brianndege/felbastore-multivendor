name: Netlify Deploy

on:
  # Run on every branch push so non-main branches can produce preview deploys.
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deploy to run"
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

concurrency:
  group: netlify-deploy-${{ github.ref }}
  cancel-in-progress: true

# Least privilege default for all jobs.
permissions:
  contents: read

env:
  # Explicit Node version for reproducible installs/builds.
  NODE_VERSION: "20"

jobs:
  deploy-preview:
    name: Deploy Preview
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # Standard stable major tag.
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate required Netlify secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secret"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate Netlify site environment (preview)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          node -e "const {execSync}=require('child_process'); try { const raw=execSync('npx netlify env:list --json',{stdio:['ignore','pipe','pipe']}).toString(); const parsed=JSON.parse(raw); const rows=Array.isArray(parsed)?parsed:Array.isArray(parsed.variables)?parsed.variables:Array.isArray(parsed.env)?parsed.env:Object.values(parsed||{}).find(Array.isArray)||[]; const names=new Set(rows.map((r)=>r?.key||r?.name||r?.id).filter(Boolean)); const missing=[]; if(!names.has('NEXTAUTH_SECRET')) missing.push('NEXTAUTH_SECRET'); if(!(names.has('DATABASE_URL')||names.has('NETLIFY_DATABASE_URL'))) missing.push('DATABASE_URL|NETLIFY_DATABASE_URL'); if(missing.length){ console.warn('Warning: missing critical Netlify env vars: '+missing.join(', ')); } const hasAppBase = names.has('NEXTAUTH_URL')||names.has('APP_URL')||names.has('NEXT_PUBLIC_APP_URL')||names.has('NEXT_PUBLIC_NEXTAUTH_URL'); if(!hasAppBase){ console.warn('Warning: no NEXTAUTH_URL/APP_URL/NEXT_PUBLIC_APP_URL/NEXT_PUBLIC_NEXTAUTH_URL found; some auth/admin links may fail in production'); } console.log('Netlify env preflight completed'); } catch (error) { console.warn('Warning: Netlify env preflight skipped due to parser/CLI error:', error?.message || error); }"

      - name: Deploy preview
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -o pipefail
          for attempt in 1 2; do
            echo "Starting Netlify preview deploy (attempt ${attempt}/2)"
            if npx netlify deploy --build --json --debug 2>&1 | tee netlify-preview-deploy.log; then
              exit 0
            fi
            if grep -E "Site deploy was successfully initiated|Site is live" netlify-preview-deploy.log >/dev/null; then
              echo "Netlify preview deploy appears successful despite CLI non-zero exit; continuing"
              exit 0
            fi
            echo "Netlify preview deploy attempt ${attempt} failed"
            tail -n 200 netlify-preview-deploy.log || true
            if [ "$attempt" -eq 2 ]; then
              echo "Netlify preview deploy failed after 2 attempts"
              exit 1
            fi
            echo "Retrying in 10 seconds"
            sleep 10
          done

  deploy-production:
    name: Deploy Production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate required Netlify secrets
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secret"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate Netlify site environment (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          node -e "const {execSync}=require('child_process'); try { const raw=execSync('npx netlify env:list --json',{stdio:['ignore','pipe','pipe']}).toString(); const parsed=JSON.parse(raw); const rows=Array.isArray(parsed)?parsed:Array.isArray(parsed.variables)?parsed.variables:Array.isArray(parsed.env)?parsed.env:Object.values(parsed||{}).find(Array.isArray)||[]; const names=new Set(rows.map((r)=>r?.key||r?.name||r?.id).filter(Boolean)); const missing=[]; if(!names.has('NEXTAUTH_SECRET')) missing.push('NEXTAUTH_SECRET'); if(!(names.has('DATABASE_URL')||names.has('NETLIFY_DATABASE_URL'))) missing.push('DATABASE_URL|NETLIFY_DATABASE_URL'); if(missing.length){ console.warn('Warning: missing critical Netlify env vars: '+missing.join(', ')); } const hasAppBase = names.has('NEXTAUTH_URL')||names.has('APP_URL')||names.has('NEXT_PUBLIC_APP_URL')||names.has('NEXT_PUBLIC_NEXTAUTH_URL'); if(!hasAppBase){ console.warn('Warning: no NEXTAUTH_URL/APP_URL/NEXT_PUBLIC_APP_URL/NEXT_PUBLIC_NEXTAUTH_URL found; some auth/admin links may fail in production'); } console.log('Netlify env preflight completed'); } catch (error) { console.warn('Warning: Netlify env preflight skipped due to parser/CLI error:', error?.message || error); }"

      - name: Deploy production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -o pipefail
          for attempt in 1 2; do
            echo "Starting Netlify production deploy (attempt ${attempt}/2)"
            if npx netlify deploy --build --prod --json --debug 2>&1 | tee netlify-production-deploy.log; then
              exit 0
            fi
            if grep -E "Site deploy was successfully initiated|Site is live" netlify-production-deploy.log >/dev/null; then
              echo "Netlify production deploy appears successful despite CLI non-zero exit; continuing"
              exit 0
            fi
            echo "Netlify production deploy attempt ${attempt} failed"
            tail -n 200 netlify-production-deploy.log || true
            if [ "$attempt" -eq 2 ]; then
              echo "Netlify production deploy failed after 2 attempts"
              exit 1
            fi
            echo "Retrying in 10 seconds"
            sleep 10
          done

  smoke-auth-production:
    name: Production Auth Smoke
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production auth smoke checks
        env:
          AUTH_SMOKE_BASE_URL: https://felbastore.co.ke
        run: npm run smoke:auth:prod
