name: Release Evidence PR Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-release-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release evidence links in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request payload found.');
              return;
            }

            const marker = '<!-- release-evidence-pr-check -->';
            const title = pr.title || '';
            const body = pr.body || '';
            const labels = (pr.labels || []).map((label) => String(label.name || '').toLowerCase());

            const isReleasePr = /\brelease\b/i.test(title) || /\brelease\b/i.test(body) || labels.includes('release');
            if (!isReleasePr) {
              core.info('PR does not look like a release PR. Skipping check.');
              return;
            }

            const checks = [
              {
                key: 'inventory-ops-smoke-gate',
                label: 'Inventory Ops Smoke Gate run URL',
                regex: /inventory-ops-smoke-gate[\s\S]{0,900}?https:\/\/github\.com\/[^\s]+\/actions\/runs\/\d+/i,
              },
              {
                key: 'inventory-dedupe-check',
                label: 'Inventory Dedupe Check run URL',
                regex: /inventory-dedupe-check[\s\S]{0,900}?https:\/\/github\.com\/[^\s]+\/actions\/runs\/\d+/i,
              },
            ];

            const missing = checks.filter((item) => !item.regex.test(body));

            const { owner, repo } = context.repo;
            const issue_number = pr.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && typeof comment.body === 'string' && comment.body.includes(marker)
            );

            let commentBody;
            if (missing.length > 0) {
              const missingList = missing.map((item) => `- [ ] ${item.label}`).join('\n');
              commentBody = `${marker}
            ⚠️ Release evidence check failed.

            This PR is marked as a release PR, but required workflow run links are missing in the PR description.

            Missing items:
            ${missingList}

            Please add workflow run URLs in the PR description, for example:
            - \\`.github/workflows/inventory-ops-smoke-gate.yml\\` → \\`https://github.com/<org>/<repo>/actions/runs/<id>\\`
            - \\`.github/workflows/inventory-dedupe-check.yml\\` → \\`https://github.com/<org>/<repo>/actions/runs/<id>\\`

            Reference: \\`docs/enterprise/RELEASE_EVIDENCE_TEMPLATE.md\\``;
            } else {
              commentBody = `${marker}
            ✅ Release evidence check passed.

            Required workflow run links were found in the PR description:
            - Inventory Ops Smoke Gate
            - Inventory Dedupe Check`;
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }

            if (missing.length > 0) {
              core.setFailed(`Missing required release evidence links: ${missing.map((item) => item.key).join(', ')}`);
            }
