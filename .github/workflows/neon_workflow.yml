name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions needed for this workflow.
permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    needs: setup
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' ||
      github.event.action == 'reopened' ||
      github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    outputs:
      db_url: ${{ steps.create_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_branch.outputs.db_url_with_pooler }}
    steps:
      - name: Compute branch expiration (2 weeks)
        id: expiration
        run: |
          # Use explicit output key consumed by later step expressions.
          echo "expires_at=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Create Neon branch
        id: create_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          # Correct step output syntax: steps.<id>.outputs.<name>
          expires_at: ${{ steps.expiration.outputs.expires_at }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
